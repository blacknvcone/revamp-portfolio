apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-payload
  namespace: cms-payload
  labels:
    app: cms-payload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cms-payload
  template:
    metadata:
      labels:
        app: cms-payload
    spec:
      # Scheduled on heimdall-vm: more CPU/RAM headroom than odin-vm
      # (odin-vm CPU limits are near capacity with existing workloads)
      nodeSelector:
        kubernetes.io/hostname: heimdall-vm
      containers:
        - name: cms-payload
          image: ghcr.io/blacknvcone/revamp-portfolio/cms-payload:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: cms-payload-secret
                  key: DATABASE_URI
            - name: PAYLOAD_SECRET
              valueFrom:
                secretKeyRef:
                  name: cms-payload-secret
                  key: PAYLOAD_SECRET
            - name: PAYLOAD_PUBLIC_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: cms-payload-secret
                  key: PAYLOAD_PUBLIC_SERVER_URL
            - name: CMS_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: cms-payload-secret
                  key: CMS_API_SECRET
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: cms-payload-secret
                  key: S3_BUCKET
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cms-payload-secret
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cms-payload-secret
                  key: S3_SECRET_ACCESS_KEY
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: cms-payload-secret
                  key: S3_ENDPOINT
            - name: S3_PUBLIC_URL
              valueFrom:
                secretKeyRef:
                  name: cms-payload-secret
                  key: S3_PUBLIC_URL
            - name: NODE_ENV
              value: "production"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: NODE_OPTIONS
              value: "--dns-result-order=ipv4first"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
      imagePullSecrets:
        - name: ghcr-pull-secret
